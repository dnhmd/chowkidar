# Spring Properties
spring:
  application:
    name: gateway

  # Database Configurations (PostgreSQL)
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/chowkidar_db}
    username: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}
  datasource:
    url: ${M_DB_URL:jdbc:postgresql://localhost:5432/chowkidar_db}
    username: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${M_DB_URL:jdbc:postgresql://localhost:5432/chowkidar_db}
    user: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}

  # Data Configurations
  data:
    # Cache Tier Configurations
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000

# Server Configurations
server:
  port: 8080

# Application Properties
chowkidar:
  cache:
    ttl-ms: 30000
  rate-limit:
    default-capacity: 100
    default-refill-rate: 10
    default-volume-limit: 10000
    default-window-size: 3600

# Logging Configurations
logging:
  level:
    com.chowkidar.gateway: DEBUG