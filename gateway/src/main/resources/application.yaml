# Spring Properties
spring:
  application:
    name: gateway

  # Database Configurations (PostgreSQL)
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/chowkidar_db}
    username: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}
  datasource:
    url: ${M_DB_URL:jdbc:postgresql://localhost:5432/chowkidar_db}
    username: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${M_DB_URL:jdbc:postgresql://localhost:5432/chowkidar_db}
    user: ${DB_USERNAME:chowkidar_user}
    password: ${DB_PASSWORD:chowkidar_password}

  # Data Configurations
  data:
    # Cache Tier Configurations
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000

# Server Configurations
server:
  port: 8080

# Application Properties
chowkidar:
  cache:
    ttl-ms: 30000
  idempotency:
    ttl-minutes: 30
    lock-ttl-seconds: 30
  rate-limit:
    default-capacity: 100
    default-refill-rate: 10
    default-volume-limit: 10000
    default-window-size: 3600
  security:
    hmac-secret: ${HMAC_SECRET:chowkidar-default-secret-change-in-production}
    api-key-grace-period-hours: 12

# Logging Configurations
logging:
  level:
    com.chowkidar.gateway: DEBUG

# Circuit Breaker Configurations
resilience4j:
  circuit-breaker:
    instances:
      postgres:
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 20
        sliding-window-type: COUNT_BASED
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
      upstream:
        failure-rate-threshold: 60
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        sliding-window-size: 20
        sliding-window-type: COUNT_BASED
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s

# Actuator Configurations

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true